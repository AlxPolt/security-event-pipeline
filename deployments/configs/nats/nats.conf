server_name: "nats"
port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
}

tls {
  cert_file: "/certs/server.pem"
  key_file:  "/certs/server-key.pem"
  ca_file:   "/certs/ca.pem"

}

authorization {
    users: [
        {
            user: "alxuser",
            password: "alxpass",
            permissions: {
                publish: ["events_subject.>", "events_subject", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"],
                subscribe: ["_INBOX.>", "$JS.API.>", "$JS.ACK.>", "events_subject.>", "events_subject"]
            }
        }
    ]
}